color:
  palette:
    gold: "#f3d567"
    orange: "#ee9b43"
    coral: "#e74b47"
    crimson: "#b80422"
    navy: "#172767"
    teal: "#19798b"
  primary: navy
  secondary: teal
  danger: crimson
  warning: gold
  info: teal

typography:
  fonts:
    - family: Lexend
      source: google
  base:
    family: Lexend
  headings:
    family: Lexend
    weight: 700
  link:
    color: navy

defaults:
  bootstrap:
    defaults:  # list of Bootstrap Sass variables to override
      link-hover-color: $brand-coral
      code-color: $brand-teal
      navbar-bg: $brand-coral
      navbar-fg: "#ffffff"
